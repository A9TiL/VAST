version: '3.8'

services:
  vast-backend:
    build: .
    container_name: vast_backend
    command : uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  vast-frontend:
    build: .
    container_name: vast_frontend
    command: streamlit run frontend.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://vast-backend:8000/api/v1
    depends_on:
      - vast-backend
  
